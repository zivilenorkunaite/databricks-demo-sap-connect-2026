bundle:
  name: sap-finance-intel

variables:
  warehouse_id:
    default: c2abb17a6c9e6bc0
  genie_room_id:
    default: 01f11b67acc9177abc5f344f75fe4389
  serving_endpoint:
    default: databricks-claude-sonnet-4-6
  lakebase_instance:
    default: sap-finance-intel
  lakebase_db:
    default: sap_finance_intel
  lakebase_pghost:
    default: instance-bf71f85b-eeda-4a0b-b496-b1ac5d090a43.database.cloud.databricks.com

targets:
  dev:
    default: true
    workspace:
      profile: DEFAULT

resources:
  apps:
    sap-finance-intel:
      name: sap-finance-intel
      source_code_path: ./app
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
        - name: serving-endpoint
          serving_endpoint:
            name: ${var.serving_endpoint}
            permission: CAN_QUERY
        - name: genie-room
          genie_space:
            name: SAP Finance Data
            space_id: ${var.genie_room_id}
            permission: CAN_RUN
        - name: lakebase
          database:
            instance_name: ${var.lakebase_instance}
            database_name: ${var.lakebase_db}
            permission: CAN_CONNECT_AND_CREATE
